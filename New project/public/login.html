<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 寻道大千联盟信息站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .auth-logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .auth-header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 26px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .password-toggle:hover {
            opacity: 1;
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #555;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-loading {
            position: relative;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #666;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .back-home a:hover {
            color: white;
        }

        .auto-login-notice {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .auto-login-notice span {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🔑</div>
                <h1>欢迎回来</h1>
                <p>登录到寻道大千联盟信息站</p>
            </div>

            <div id="autoLoginNotice" class="auto-login-notice" style="display: none;">
                <span>⏳</span>
                <span>检测到已保存的登录状态，正在验证...</span>
            </div>

            <div id="alertError" class="alert alert-error"></div>
            <div id="alertSuccess" class="alert alert-success"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名 / 邮箱</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名或邮箱" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">👁️</button>
                    </div>
                </div>

                <div class="remember-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" checked>
                        <span>7天内自动登录</span>
                    </label>
                    <a href="forgot.html" class="forgot-link">忘记密码？</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">登 录</button>
            </form>

            <div class="auth-footer">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
        </div>

        <div class="back-home">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api/auth';
        
        // 页面加载时检查自动登录
        document.addEventListener('DOMContentLoaded', function() {
            checkAutoLogin();
        });

        // 检查自动登录
        async function checkAutoLogin() {
            const savedUser = localStorage.getItem('alliance_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user.username && user.token) {
                        document.getElementById('username').value = user.username;
                        document.getElementById('autoLoginNotice').style.display = 'flex';
                        
                        // 验证 token 是否有效
                        const response = await fetch(`${API_BASE}/check`, {
                            credentials: 'include'
                        });
                        const data = await response.json();
                        
                        if (data.valid) {
                            // token 有效，跳转主页
                            window.location.href = 'index.html';
                        } else {
                            // token 失效，清除本地存储
                            localStorage.removeItem('alliance_user');
                            document.getElementById('autoLoginNotice').style.display = 'none';
                        }
                    }
                } catch (e) {
                    localStorage.removeItem('alliance_user');
                }
            }
        }

        // 切换密码可见性
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // 显示提示
        function showAlert(type, message) {
            const errorAlert = document.getElementById('alertError');
            const successAlert = document.getElementById('alertSuccess');
            
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            if (type === 'error') {
                errorAlert.textContent = message;
                errorAlert.style.display = 'block';
            } else {
                successAlert.textContent = message;
                successAlert.style.display = 'block';
            }
        }

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            if (!username || !password) {
                showAlert('error', '请输入用户名和密码');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');
            loginBtn.textContent = '登录中';
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 保存到 localStorage
                    if (rememberMe) {
                        localStorage.setItem('alliance_user', JSON.stringify({
                            username: username,
                            token: 'saved',
                            loginTime: Date.now()
                        }));
                    }
                    
                    showAlert('success', '登录成功！正在跳转...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert('error', data.error || '登录失败，请检查用户名和密码');
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('btn-loading');
                    loginBtn.textContent = '登 录';
                }
            } catch (error) {
                showAlert('error', '网络错误，请检查服务器是否运行');
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
                loginBtn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
