<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寻道大千联盟信息板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <!-- 全局认证检查脚本 -->
  <script src="/auth-check.js"></script>
</head>
<body>
  <div class="board-page">
    <header class="board-top">
      <div class="board-top__brand">
        <p class="board-eyebrow">XUNDAO DQ · ALLIANCE BOARD</p>
        <h1 id="allianceName">青云联盟</h1>
      </div>
      <div class="board-top__actions">
        <span id="userInfo" class="user-info hidden">
          <span class="user-username"></span>
          <button id="logoutBtn" type="button" class="logout-btn">退出</button>
        </span>
        <a href="login.html" id="loginLink" class="login-link">登录</a>
      </div>
      <div class="board-top__stats">
        <span id="memberCount">0 名成员</span>
        <span id="guildCount">0 个妖盟</span>
        <span id="hillCount">0 个联盟</span>
      </div>
    </header>

    <nav class="top-pills">
      <button class="top-pills__btn is-active" data-view="guilds">🪭 妖盟总览</button>
      <button class="top-pills__btn" data-view="ranking">🏆 排行榜</button>
      <button class="top-pills__btn" data-view="guildAdmin">＋ 录入新妖盟</button>
      <button class="top-pills__btn" data-view="melon">🍉 瓜棚</button>
      <button class="top-pills__btn" data-view="announcementAdmin">📣 发布动态</button>
    </nav>

    <main class="board-layout">
      <aside class="side-filter">
        <section class="side-filter__panel side-filter__panel--search">
          <div class="side-filter__search-row">
            <input id="searchInput" type="search" placeholder="搜索联盟或妖盟...">
            <button type="button" class="side-filter__search-btn" id="searchBtn">🔍</button>
          </div>
          <div class="side-filter__action-row">
            <select id="guildFilter">
              <option value="all">选择妖盟</option>
            </select>
            <button type="button" id="backTopBtn" class="side-filter__jump-btn">回到顶部</button>
          </div>
        </section>

        <section class="side-filter__panel side-filter__panel--meta">
          <p><span>当前联盟:</span><strong id="currentHillLabel">全部</strong></p>
          <p><span>联盟妖盟数:</span><strong id="currentGuildCount">0</strong></p>
        </section>

        <section id="hillList" class="hill-nav"></section>
      </aside>

      <section class="main-board">
        <section class="board-panel is-active" data-panel="guilds">
          <div id="guildSummary" class="hill-board-list"></div>
        </section>

        <section class="board-panel" data-panel="guildDetail">
          <article class="panel-card">
            <div class="panel-card__head panel-card__head--detail">
              <div class="detail-title-group">
                <button type="button" id="guildDetailBack" class="detail-back-btn">← 返回总览</button>
                <h2 id="guildDetailTitle">妖盟详情</h2>
                <p id="guildDetailMeta" class="detail-meta"></p>
              </div>
              <div id="guildDetailActions" class="panel-toolbar"></div>
            </div>
            <div class="detail-filter-bar">
              <input id="guildDetailSearch" type="search" placeholder="搜索成员昵称、境界、备注">
              <select id="guildDetailRoleFilter">
                <option value="all">全部职位</option>
              </select>
            </div>
            <div id="guildDetailList" class="detail-member-list"></div>
          </article>
        </section>

        <section class="board-panel" data-panel="ranking">
          <article class="panel-card">
            <div class="panel-card__head">
              <h2>🏆 联盟排行榜</h2>
              <div class="panel-toolbar">
                <select id="rankingGuildFilter">
                  <option value="all">全部妖盟</option>
                </select>
                <select id="sortSelect">
                  <option value="power-desc">战力从高到低</option>
                  <option value="power-asc">战力从低到高</option>
                  <option value="name-asc">按昵称排序</option>
                </select>
              </div>
            </div>
            <div id="rankingList" class="ranking-list"></div>
          </article>
        </section>

        <section class="board-panel" data-panel="announcements">
          <article class="panel-card">
            <div class="panel-card__head">
              <h2>📣 联盟公告</h2>
            </div>
            <div id="announcementList" class="feed-list"></div>
          </article>
        </section>

        <section class="board-panel" data-panel="melon">
          <article class="panel-card">
            <div class="panel-card__head">
              <h2>🍉 联盟瓜棚</h2>
            </div>
            <div id="melonList" class="feed-list"></div>
          </article>
        </section>

        <section class="board-panel" data-panel="guildAdmin">
          <article class="panel-card">
            <div class="panel-card__head">
              <h2>＋ 录入新妖盟</h2>
            </div>

            <div class="admin-gate" id="guildAdminGate">
              <p>请先登录管理员账号，再使用录入和管理功能。</p>
            </div>

            <div class="admin-layout hidden" id="guildAdminLayout">
              <section class="admin-card admin-card--full">
                <div class="admin-card__head">
                  <h3 id="memberFormTitle">录入新妖盟</h3>
                  <button type="button" class="ghost-btn" id="resetMemberBtn">清空表单</button>
                </div>
                <p id="memberFormHint" class="form-hint">新增妖盟时填写完整信息；编辑妖盟时只修改妖盟名称和盟主昵称。</p>
                <form id="memberForm" class="member-form">
                  <input type="hidden" id="memberId">
                  <label>联盟名称<input id="memberAlliance" type="text" required></label>
                  <label>妖盟编号<input id="memberGuildCode" type="text" placeholder="如 833"></label>
                  <label>山名字号<input id="memberGuildPrefix" type="text" placeholder="如 长虹山"></label>
                  <label>妖盟总战力<input id="memberGuildPower" type="number" min="0" placeholder="可手动填写总战力"></label>
                  <label>妖盟名称<input id="memberGuild" type="text" required placeholder="如 劳资蜀道山"></label>
                  <label>盟主昵称<input id="memberName" type="text" required placeholder="如 猪了个猪"></label>
                  <label class="full">妖盟备注<textarea id="memberNote" rows="4" placeholder="可填写招新要求、联盟风格、注意事项"></textarea></label>
                  <button type="submit" class="primary-btn full" id="memberSubmitBtn">保存妖盟</button>
                </form>
              </section>

              <section class="admin-card admin-card--full">
                <div class="admin-card__head">
                  <h3>妖盟管理列表</h3>
                  <button type="button" class="ghost-btn" id="refreshBtn">刷新数据</button>
                </div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>联盟</th>
                        <th>山头号</th>
                        <th>妖盟</th>
                        <th>盟主</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody id="adminMemberTable"></tbody>
                  </table>
                </div>
              </section>
            </div>
          </article>
        </section>

        <section class="board-panel" data-panel="announcementAdmin">
          <article class="panel-card">
            <div class="panel-card__head">
              <h2>📣 发布动态</h2>
            </div>

            <div class="admin-gate" id="announcementAdminGate">
              <p>请先登录管理员账号，再发布或管理动态。</p>
            </div>

            <div class="admin-layout hidden" id="announcementAdminLayout">
              <section class="admin-card admin-card--full">
                <div class="admin-card__head">
                  <h3 id="announcementFormTitle">发布动态</h3>
                  <button type="button" class="ghost-btn" id="resetAnnouncementBtn">清空表单</button>
                </div>
                <form id="announcementForm" class="announcement-form">
                  <input type="hidden" id="announcementId">
                  <label>分类
                    <select id="announcementCategory">
                      <option value="公告">公告</option>
                      <option value="瓜棚">瓜棚</option>
                    </select>
                  </label>
                  <label>标题<input id="announcementTitle" type="text" required></label>
                  <label class="full">内容<textarea id="announcementContent" rows="5" required></textarea></label>
                  <button type="submit" class="primary-btn full" id="announcementSubmitBtn">发布内容</button>
                </form>
              </section>

              <section class="admin-card admin-card--full">
                <div class="admin-card__head">
                  <h3>动态管理列表</h3>
                </div>
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>分类</th>
                        <th>标题</th>
                        <th>发布时间</th>
                        <th>操作</th>
                      </tr>
                    </thead>
                    <tbody id="adminAnnouncementTable"></tbody>
                  </table>
                </div>
              </section>
            </div>
          </article>
        </section>
      </section>
    </main>
  </div>

  <template id="rankingItemTemplate">
    <article class="ranking-item">
      <span class="ranking-item__index"></span>
      <div>
        <strong class="ranking-item__name"></strong>
        <p class="ranking-item__meta"></p>
      </div>
      <strong class="ranking-item__power"></strong>
    </article>
  </template>

  <div id="guildEditModal" class="modal hidden">
    <div class="modal__backdrop" data-close-modal="guild-edit"></div>
    <div class="modal__dialog">
      <div class="modal__head">
        <h3 id="guildEditTitle">编辑妖盟</h3>
        <button type="button" class="ghost-btn" data-close-modal="guild-edit">关闭</button>
      </div>
      <form id="guildEditForm" class="member-form">
        <input type="hidden" id="guildEditKey">
        <label>联盟名称<input id="guildEditAlliance" type="text" readonly></label>
        <label>山头号<input id="guildEditCode" type="text" readonly></label>
        <label>山名字号<input id="guildEditPrefix" type="text" readonly></label>
        <label>妖盟总战力<input id="guildEditPower" type="text" readonly></label>
        <label>妖盟名称<input id="guildEditName" type="text" required></label>
        <label>盟主昵称<input id="guildEditLeader" type="text" required></label>
        <label class="full">妖盟备注<textarea id="guildEditNote" rows="3" readonly></textarea></label>
        <div class="modal__actions full">
          <button type="button" class="ghost-btn" data-close-modal="guild-edit">取消</button>
          <button type="submit" class="primary-btn">保存修改</button>
        </div>
      </form>
    </div>
  </div>

  <div id="memberEditModal" class="modal hidden">
    <div class="modal__backdrop" data-close-modal="member-edit"></div>
    <div class="modal__dialog">
      <div class="modal__head">
        <h3 id="memberEditTitle">编辑成员</h3>
        <button type="button" class="ghost-btn" data-close-modal="member-edit">关闭</button>
      </div>
      <form id="memberEditForm" class="member-form">
        <input type="hidden" id="memberEditId">
        <input type="hidden" id="memberEditGuildKey">
        <label>联盟名称<input id="memberEditAlliance" type="text" readonly></label>
        <label>所属妖盟<input id="memberEditGuildDisplay" type="text" readonly></label>
        <label>成员昵称<input id="memberEditName" type="text" required></label>
        <label>职位<input id="memberEditRole" type="text" required></label>
        <label>境界<input id="memberEditRealm" type="text" required></label>
        <label>战力<input id="memberEditPower" type="number" min="0" required></label>
        <label>敏捷<input id="memberEditSpeed" type="number" min="0" required></label>
        <label>灵兽<input id="memberEditPet" type="text" required></label>
        <label>增伤<input id="memberEditBonusDamage" type="number" min="0" required></label>
        <label>减伤<input id="memberEditDamageReduction" type="number" min="0" required></label>
        <label class="full">备注<textarea id="memberEditNote" rows="3"></textarea></label>
        <div class="modal__actions full">
          <button type="button" class="ghost-btn" data-close-modal="member-edit">取消</button>
          <button type="submit" class="primary-btn">保存成员</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
